# writing user-defined text objects
repo = 'kana/vim-textobj-user'

[[plugins]]
# show VCS difference in the sign column
repo = 'mhinz/vim-signify'

[[plugins]]
# Intellisense engine
repo = 'neoclide/coc.nvim'
rev = 'release'

[[plugins]]
# all trailing whitespaces to be highlighted
repo = 'ntpeters/vim-better-whitespace'

[[plugins]]
# a tool for writers with auto wordwrap and so on
repo = 'reedes/vim-pencil'

[[plugins]]
# 4,cl - comments multiple lines out
repo = 'scrooloose/nerdcommenter'

