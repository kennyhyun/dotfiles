[[plugins]]
# :Switch - toggle true/false, styles
repo = 'AndrewRadev/switch.vim'

[[plugins]]
# ,,s - jump to the character
repo = 'Lokaltog/vim-easymotion'

[[plugins]]
repo = 'Shougo/dein.vim'

[[plugins]]
# Interactive command execution in Vim
repo = 'Shougo/vimproc.vim'
build = 'make'

#[[plugins]]
#repo = 'Shougo/vimshell.vim'

[[plugins]]
# lean & mean status/tabline
repo = 'bling/vim-airline'

[[plugins]]
# navigation between tmux panes
repo = 'christoomey/vim-tmux-navigator'

#[[plugins]]
# maintain consistent coding styles
#repo = 'editorconfig/editorconfig-vim'

[[plugins]]
# a repository viewer similar to gitk
repo = 'gregsexton/gitv'

[[plugins]]
# /\v - Improved incremental searching
repo = 'haya14busa/incsearch.vim'

