# Fugitive extension to manage and merge Git branches # requires fugitive
#repo = 'idanarye/vim-merginal'

# https://github.com/Shougo/dein.vim/issues/74#issuecomment-237198717
[[plugins]]
# fuzzy finder
repo = 'junegunn/fzf'
build = './install --all'
merged = 0

[[plugins]]
# fuzzy finder
repo = 'junegunn/fzf.vim'
depends = 'fzf'

[[plugins]]
# :Goyo - Distraction-free writing
repo = 'junegunn/goyo.vim'

[[plugins]]
# alignment plugin
repo = 'junegunn/vim-easy-align'

[[plugins]]
# text objects to select a portion of the current line ; requires kana/vim-textobj-user
repo = 'kana/vim-textobj-line'
